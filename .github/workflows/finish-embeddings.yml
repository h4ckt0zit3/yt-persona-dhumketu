name: drive-script finish (clean + chunk + embed)

on:
  workflow_dispatch: {}

jobs:
  finish:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    defaults:
      run:
        working-directory: drive-script
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: drive-script/requirements.txt
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-minilm-v1
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Clean (Groq)
        run: python clean_data
      - name: Chunk
        run: python chunking.py
      - name: Embed (MiniLM)
        run: python embedding.py
